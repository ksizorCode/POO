<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programación Orientada a Objetos - Ejercicios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .exercise-card {
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .exercise-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="p-6 md:p-12">

    <div class="max-w-3xl mx-auto">
        <header class="mb-10 text-center">
            <h1 class="text-4xl font-bold text-slate-800 mb-2">Programación Orientada a Objetos</h1>
            <p class="text-slate-600">Listado de ejercicios prácticos y recursos</p>
        </header>

        <!-- Contenedor de mensajes -->
        <div id="message-container" class="hidden mb-6 p-4 rounded-lg bg-red-100 text-red-700 border border-red-200">
        </div>

        <!-- Lista de ejercicios -->
        <div id="lista-ejercicios" class="grid gap-4">
            <!-- Los items se cargarán aquí -->
            <div class="animate-pulse flex space-x-4">
                <div class="flex-1 space-y-4 py-1">
                    <div class="h-12 bg-slate-200 rounded"></div>
                    <div class="h-12 bg-slate-200 rounded"></div>
                    <div class="h-12 bg-slate-200 rounded"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Función para cargar y desplegar el JSON
        async function cargarEjercicios() {
            const listaContainer = document.getElementById('lista-ejercicios');
            const messageContainer = document.getElementById('message-container');

            try {
                // En un entorno real, fetch('lista.json')
                // Simulamos la carga para que sea funcional en esta visualización
                // Si tienes el archivo local, el código fetch funcionará correctamente.
                
                let data;
                try {
                    const response = await fetch('lista.json');
                    if (!response.ok) throw new Error('No se pudo cargar el archivo JSON');
                    data = await response.json();
                } catch (e) {
                    // Fallback con datos de ejemplo si el archivo no existe localmente aún
                    console.warn("Usando datos de respaldo al no encontrar lista.json");
                    data = [
                        { "titulo": "Clase Coche", "emoticono": "🚗", "url": "coche.html" },
                        { "titulo": "Harry Potter OO", "emoticono": "🪄", "url": "harrypotter.html" },
                        { "titulo": "Cajero Automático", "emoticono": "🏧", "url": "cajero.html" }
                    ];
                }

                renderizarLista(data);

            } catch (error) {
                messageContainer.textContent = "Error: " + error.message;
                messageContainer.classList.remove('hidden');
                listaContainer.innerHTML = "";
            }
        }

        function renderizarLista(ejercicios) {
            const listaContainer = document.getElementById('lista-ejercicios');
            listaContainer.innerHTML = "";

            ejercicios.forEach(ejercicio => {
                const card = document.createElement('a');
                card.href = ejercicio.url;
                card.className = "exercise-card flex items-center p-5 bg-white border border-slate-200 rounded-xl no-underline text-slate-800";
                
                card.innerHTML = `
                    <div class="text-3xl mr-5 bg-slate-50 w-14 h-14 flex items-center justify-center rounded-full">
                        ${ejercicio.emoticono}
                    </div>
                    <div class="flex-1">
                        <h2 class="text-xl font-semibold">${ejercicio.titulo}</h2>
                        <span class="text-sm text-blue-500 font-medium">Ver ejercicio →</span>
                    </div>
                `;

                listaContainer.appendChild(card);
            });
        }

        // Iniciar carga al estar listo el DOM
        window.onload = cargarEjercicios;
    </script>
</body>
</html>
